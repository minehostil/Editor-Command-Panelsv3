<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GUI Progresos Master v17.0</title>
    <style>
        :root { --primary: #1e293b; --accent: #5DFA30; --val-default: #AEFAB4; --bg: #f1f5f9; --reset-color: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .settings { width: 750px; background: white; padding: 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.1); overflow-y: auto; height: 100%; }
        .code-view { flex-grow: 1; background: #0d1117; color: #c9d1d9; padding: 25px; overflow-y: auto; position: relative; }
        .card { background: #f8fafc; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-left: 4px solid #cbd5e1; }
        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; border-bottom: 2px solid var(--accent); display: inline-block; text-transform: uppercase; }
        label { display: block; font-size: 0.65rem; font-weight: bold; margin-bottom: 3px; color: #334155; margin-top: 5px; }
        input, select, textarea { width: 100%; padding: 7px; margin-bottom: 5px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 0.75rem; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 24px); gap: 2px; background: #8b8b8b; padding: 5px; border: 2px solid #373737; width: fit-content; margin: 0 auto 15px; }
        .slot { width: 24px; height: 24px; background: #c6c6c6; border: 2px solid; border-color: #ffffff #555555 #555555 #ffffff; }
        .slot.active { background: var(--accent); border-color: #8effa8 #0a6b22 #0a6b22 #8effa8; }
        .slot.empty { background: #333; border-color: #555 #111 #111 #555; }

        .req-row-grid { display: grid; grid-template-columns: 1.5fr 1.5fr 0.6fr 0.6fr 0.5fr; gap: 8px; margin-bottom: 10px; }
        .btn-group { position: sticky; top: 0; float: right; display: flex; gap: 8px; z-index: 100; }
        .copy-btn, .dl-btn, .reset-btn { border: none; padding: 10px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .copy-btn { background: var(--accent); color: #000; }
        .dl-btn { background: #3b82f6; color: #fff; }
        .reset-btn { background: var(--reset-color); color: #fff; }
        pre { font-family: 'Fira Code', monospace; font-size: 10px; line-height: 1.3; margin-top: 50px; color: #79c0ff; white-space: pre; }
        .switch { cursor: pointer; font-size: 9px; background: #cbd5e1; padding: 4px 8px; border-radius: 4px; user-select: none; }
        .switch.on { background: var(--accent); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div class="settings">
    <div class="header-bar">
        <h2 style="margin:0; font-size: 1.2rem; color: var(--primary);">Editor de Progresos v17.0</h2>
        <button class="reset-btn" onclick="location.reload()">⚠ RESETEAR TODO</button>
    </div>

    <div class="card" style="border-left-color: #3b82f6;">
        <div class="section-title">⚙️ Sistema y Permisos</div>
        <div class="inv-grid" id="invPreview"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
            <div>
                <label>Raíz del Permiso:</label>
                <input type="text" id="permRoot" placeholder="ejemplo.de.permiso" value="progreso.personalizado" oninput="gen()">
            </div>
            <div>
                <label>Niveles a Generar:</label>
                <input type="number" id="batch" value="5" min="1" max="28" oninput="gen()">
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px;">
            <div><label>Color de Valores:</label><input type="text" id="valCol" value="#AEFAB4" oninput="gen()"></div>
            <div><label>Nombre Panel (YAML):</label><input type="text" id="panelName" value="menu_progresos" oninput="gen()"></div>
        </div>
    </div>

    <div class="card" style="border-left-color: #f97316;">
        <div class="section-title">🎨 Apariencia y Lore</div>
        <input type="text" id="itemName" value="#16db47Nivel #{lv}" oninput="gen()">
        <label>Lore Base (Descripción del Ítem):</label>
        <textarea id="itemLore" oninput="gen()" style="min-height: 80px;">&8ᴘʀᴏɢʀᴇꜱᴏ
 
&fDesbloquea esta recompensa
&fcompletando las tareas.</textarea>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
            <div>
                <label>Texto Botón Desbloqueado:</label>
                <input type="text" id="btnClaim" value="&eClic para reclamar!" oninput="gen()">
            </div>
            <div>
                <label>Texto Botón Completado:</label>
                <input type="text" id="btnDone" value="&aNivel completado" oninput="gen()">
            </div>
        </div>
    </div>

    <div class="card" style="border-left-color: #16a34a; background: #f0fdf4;">
        <div class="section-title">📊 Requisitos</div>
        <div id="reqsArea">
            <script>
                const defTexts = ["Horas Jugadas", "Asesinatos", "", "", ""];
                const defVars = ["%statistic_hours_played%", "%statistic_player_kills%", "", "", ""];
                const defBase = [1, 0, 0, 0, 0];
                const defAdd = [1, 0, 0, 0, 0];
                for(let r=1; r<=5; r++){
                    document.write(`
                    <div class="req-row-grid">
                        <input type="text" id="req${r}T" placeholder="Nombre Visual" value="${defTexts[r-1]}" oninput="gen()">
                        <input type="text" id="req${r}P" placeholder="%placeholder%" value="${defVars[r-1]}" oninput="gen()">
                        <input type="number" id="req${r}B" value="${defBase[r-1]}" oninput="gen()">
                        <input type="number" id="req${r}A" value="${defAdd[r-1]}" oninput="gen()">
                        <input type="text" id="req${r}Col" value="#5DFA30" oninput="gen()">
                    </div>`);
                }
            </script>
        </div>
    </div>

    <div id="rewardsContainer"></div>
</div>

<div class="code-view">
    <div class="btn-group">
        <button class="copy-btn" onclick="copyText()">COPIAR</button>
        <button class="dl-btn" onclick="downloadYaml()">DESCARGAR</button>
    </div>
    <pre id="output"></pre>
</div>

<script>
const SLOT_PATTERN = [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34,37,38,39,40,41,42,43];
let rewardsState = { 1: true, 2: true, 3: false, 4: false, 5: false, 6: false, 7: false, 8: false, 9: false, 10: false };

function initRewards() {
    const container = document.getElementById('rewardsContainer');
    container.innerHTML = "";
    for(let i=1; i<=10; i++) {
        container.innerHTML += `
            <div class="card ${rewardsState[i]?'':'disabled'}" id="card${i}" style="border-left-color: ${rewardsState[i]?'#5DFA30':'#cbd5e1'}">
                <h3>RECOMPENSA #${i} <span class="switch ${rewardsState[i]?'on':''}" onclick="toggleRew(${i})">${rewardsState[i]?'ACTIVA':'OFF'}</span></h3>
                <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap: 5px;">
                    <input type="text" id="r${i}L" value="${i==1?'Dinero':(i==2?'Tokens':'')}" oninput="gen()">
                    <input type="text" id="r${i}Col" value="#5DFA30" oninput="gen()">
                    <select id="r${i}M" onchange="gen()"><option value="mult">Mult</option><option value="sum">Fijo</option></select>
                </div>
                <input type="text" id="r${i}C" value="${i==1?'eco give %player% {val}':(i==2?'tokens give %player% {val}':'')}" oninput="gen()">
                <div style="display:grid; grid-template-columns: 1fr 2fr; gap:10px;">
                    <input type="number" id="r${i}B" value="${i==1?5000:(i==2?10:0)}" oninput="gen()">
                    <input type="text" id="r${i}List" placeholder="Niveles" oninput="gen()">
                </div>
            </div>`;
    }
}

function toggleRew(id) { rewardsState[id] = !rewardsState[id]; initRewards(); gen(); }

function gen() {
    const batch = parseInt(document.getElementById('batch').value) || 1;
    const valCol = document.getElementById('valCol').value;
    const pRoot = document.getElementById('permRoot').value || 'ejemplo.de.permiso';
    const pName = document.getElementById('panelName').value;
    const cName = document.getElementById('itemName').value;
    const customLore = document.getElementById('itemLore').value.split('\n');
    const bClaim = document.getElementById('btnClaim').value;
    const bDone = document.getElementById('btnDone').value;
    const cSec = "#5DFA30";

    const grid = document.getElementById('invPreview');
    grid.innerHTML = '';
    const slotsUsed = SLOT_PATTERN.slice(0, batch);
    for(let i=0; i<54; i++) {
        const d = document.createElement('div'); d.className = 'slot ' + (slotsUsed.includes(i) ? 'active' : 'empty'); grid.appendChild(d);
    }

    let res = `panels:\n  ${pName}:\n    perm: default\n    rows: 6\n    commands-on-open:\n    - refresh\n    title: '&8Menu | Progresos'\n    empty: BLACK_STAINED_GLASS_PANE\n    panelType:\n    - static\n    item:\n`;

    for(let i=0; i < Math.min(batch, SLOT_PATTERN.length); i++) {
        let lv = i+1; let sl = SLOT_PATTERN[i];
        let activeReqs = [];
        for(let r=1; r<=5; r++){
            let txt = document.getElementById(`req${r}T`).value;
            let ph = document.getElementById(`req${r}P`).value;
            if(ph.trim()){ 
                activeReqs.push({ 
                    t: txt, p: ph, 
                    goal: (parseInt(document.getElementById(`req${r}B`).value) || 0) + ((parseInt(document.getElementById(`req${r}A`).value) || 0) * i), 
                    col: document.getElementById(`req${r}Col`).value 
                }); 
            }
        }

        const buildLore = (sp) => {
            let l = "";
            customLore.forEach(line => { l += `\n${" ".repeat(sp)}- '${line}'`; });
            return l;
        };
        
        const getProgresoLore = (sp, status) => {
            if(activeReqs.length === 0) return "";
            let l = `\n${" ".repeat(sp)}- ' '\n${" ".repeat(sp)}- '${cSec}Requisitos:'`;
            activeReqs.forEach(req => { 
                if(status === 'done') {
                    l += `\n${" ".repeat(sp)}- ' ${req.col}• &f${req.t}: ${valCol}${req.goal}'`; 
                } else {
                    l += `\n${" ".repeat(sp)}- ' ${req.col}• &f${req.t}: &c${req.p}&7/${valCol}${req.goal}'`; 
                }
            });
            return l;
        };

        const getRewardsLore = (sp) => {
            let l = `\n${" ".repeat(sp)}- ''\n${" ".repeat(sp)}- '${cSec}Recompensas:'`;
            let any = false;
            for(let r=1; r<=10; r++){
                if(rewardsState[r]){
                    let txt = document.getElementById(`r${r}L`).value;
                    let list = document.getElementById(`r${r}List`).value;
                    if(txt && (!list || list.split(',').map(n=>parseInt(n.trim())).includes(lv))){
                        let val = (document.getElementById(`r${r}M`).value === 'mult') ? (parseInt(document.getElementById(`r${r}B`).value)*lv) : parseInt(document.getElementById(`r${r}B`).value);
                        l += `\n${" ".repeat(sp)}- ' ${document.getElementById(`r${r}Col`).value}• &f${txt}: ${valCol}${val}'`;
                        any = true;
                    }
                }
            }
            return any ? l : "";
        };

        const getCmds = (sp) => {
            let c = "";
            for(let r=1; r<=10; r++){
                if(rewardsState[r]){
                    let cmd = document.getElementById(`r${r}C`).value;
                    let list = document.getElementById(`r${r}List`).value;
                    if(cmd && (!list || list.split(',').map(n=>parseInt(n.trim())).includes(lv))){
                        let val = (document.getElementById(`r${r}M`).value === 'mult') ? (parseInt(document.getElementById(`r${r}B`).value)*lv) : parseInt(document.getElementById(`r${r}B`).value);
                        c += `\n${" ".repeat(sp)}- console= ${cmd.replace('{val}', val).replace('{lv}', lv)}`;
                    }
                }
            }
            return c;
        };

        let conds = ""; 
        activeReqs.forEach((req, idx) => { 
            let suffix = (idx === activeReqs.length - 1) ? "" : " AND";
            conds += `\n          value${idx}: '${req.p} ISGREATER'\n          compare${idx}: '${req.goal}${suffix}'`; 
        });

        res += `      '${sl}':
        material: RED_STAINED_GLASS_PANE
        name: '${cName.replace('{lv}', lv)} &c[ʙʟᴏǫᴜᴇᴀᴅᴏ]'
        lore:${buildLore(8)}${getProgresoLore(8, 'locked')}${getRewardsLore(8)}
        - ''
        - '${valCol}➥ ${bClaim}'
        commands:
        - sound= ENTITY_VILLAGER_NO 10 1
        - 'msg= #16db47&lPROGRESOS&r &8» #FF6A6AAun no cumples los requisitos.'
        has0:
          value0: '%cp-player-name% HASPERM'
          compare0: ${pRoot}.${lv}
          material: LIME_STAINED_GLASS_PANE
          name: '${cName.replace('{lv}', lv)} &a[ᴄᴏᴍᴘʟᴇᴛᴀᴅᴏ]'
          lore:${buildLore(10)}${getProgresoLore(10, 'done')}${getRewardsLore(10)}
          - ''
          - '${valCol}➥ ${bDone}'
        has1:${conds}
          material: ORANGE_STAINED_GLASS_PANE
          name: '${cName.replace('{lv}', lv)} &a[ᴅᴇꜱʙʟᴏǫᴜᴇᴀᴅᴏ]'
          lore:${buildLore(10)}${getProgresoLore(10, 'unlocked')}${getRewardsLore(10)}
          - ''
          - '${valCol}➥ ${bClaim}'
          commands:
          - sound= ENTITY_PLAYER_LEVELUP 10 1
          - console= lp user %cp-player-name% permission set ${pRoot}.${lv} true${getCmds(10)}
          - delay= 5 refresh\n`;
    }
    document.getElementById('output').innerText = res;
}
initRewards(); gen();
function copyText() { navigator.clipboard.writeText(document.getElementById('output').innerText); alert("¡Copiado!"); }
function downloadYaml() {
    const text = document.getElementById('output').innerText;
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), text], { type: 'text/yaml;charset=utf-8' });
    const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = 'config_v17.yml'; a.click();
}
</script>
</body>
</html>
